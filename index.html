<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>离散数学 · 期末速成刷题站</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;0,9..144,900;1,9..144,500&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">

<script>
window.MathJax = {
  tex: {
    inlineMath: [['$', '$'], ['\\(', '\\)']],
    displayMath: [['$$', '$$'], ['\\[', '\\]']],
    processEscapes: true,
  },
  svg: { fontCache: 'global' },
  options: { skipHtmlTags: ['script', 'noscript', 'style', 'textarea', 'pre', 'code'] },
  startup: { typeset: false },
};
</script>
<script src="vendor/marked.min.js"></script>
<script async src="vendor/tex-svg.js"></script>

<style>
:root {
  --paper: #f4efe3;
  --paper-2: #fbf8f0;
  --card: #fffdf7;
  --ink: #20222e;
  --ink-soft: #565a6c;
  --line: #d9d2c0;
  --grid: rgba(43, 69, 112, 0.06);
  --accent: #2b4570;      /* ink blue */
  --accent-soft: #5b7aa8;
  --hot: #c4453a;         /* vermilion */
  --amber: #c08a2e;
  --green: #4a7c59;
  --shadow: 0 1px 2px rgba(32,34,46,.06), 0 8px 24px rgba(32,34,46,.07);
  --shadow-lift: 0 4px 10px rgba(32,34,46,.10), 0 18px 40px rgba(32,34,46,.12);
  --radius: 14px;
  --maxw: 880px;
  --font-display: 'Fraunces', 'PingFang SC', Georgia, serif;
  --font-ui: 'PingFang SC', 'Microsoft YaHei', system-ui, -apple-system, sans-serif;
  --font-mono: 'JetBrains Mono', 'PingFang SC', monospace;
}
[data-theme="dark"] {
  --paper: #14161f;
  --paper-2: #181b26;
  --card: #1e2230;
  --ink: #e9e4d6;
  --ink-soft: #9aa0b4;
  --line: #2c3144;
  --grid: rgba(140, 170, 220, 0.05);
  --accent: #8fb0e0;
  --accent-soft: #6f8fc0;
  --hot: #e2685c;
  --amber: #d6a850;
  --green: #7bbf90;
  --card: #1e2230;
  --shadow: 0 1px 2px rgba(0,0,0,.3), 0 10px 28px rgba(0,0,0,.35);
  --shadow-lift: 0 6px 14px rgba(0,0,0,.4), 0 22px 50px rgba(0,0,0,.5);
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  font-family: var(--font-ui);
  color: var(--ink);
  background-color: var(--paper);
  background-image:
    linear-gradient(var(--grid) 1px, transparent 1px),
    linear-gradient(90deg, var(--grid) 1px, transparent 1px);
  background-size: 26px 26px;
  line-height: 1.7;
  -webkit-font-smoothing: antialiased;
  letter-spacing: .005em;
}

/* ---------- Layout ---------- */
.app { display: grid; grid-template-columns: 296px 1fr; min-height: 100vh; }

/* ---------- Sidebar ---------- */
.sidebar {
  position: sticky; top: 0; height: 100vh; overflow-y: auto;
  background: var(--paper-2);
  border-right: 1px solid var(--line);
  padding: 26px 18px 40px;
  display: flex; flex-direction: column; gap: 22px;
}
.brand { display: flex; flex-direction: column; gap: 4px; padding: 0 6px; }
.brand .kicker { font-family: var(--font-mono); font-size: 10.5px; letter-spacing: .28em; text-transform: uppercase; color: var(--hot); font-weight: 700; }
.brand h1 { font-family: var(--font-display); font-weight: 900; font-size: 27px; line-height: 1.05; letter-spacing: -.01em; }
.brand .sub { font-size: 11.5px; color: var(--ink-soft); font-family: var(--font-mono); }

.progress-wrap { display: flex; align-items: center; gap: 14px; padding: 14px; background: var(--card); border: 1px solid var(--line); border-radius: var(--radius); box-shadow: var(--shadow); }
.ring { position: relative; width: 56px; height: 56px; flex: none; }
.ring svg { transform: rotate(-90deg); }
.ring .track { stroke: var(--line); }
.ring .fill { stroke: var(--hot); stroke-linecap: round; transition: stroke-dashoffset .6s cubic-bezier(.2,.8,.2,1); }
.ring .pct { position: absolute; inset: 0; display: grid; place-items: center; font-family: var(--font-mono); font-weight: 700; font-size: 13px; }
.progress-meta { font-size: 12px; color: var(--ink-soft); }
.progress-meta b { color: var(--ink); font-size: 13px; font-family: var(--font-mono); }

.nav-section-label { font-family: var(--font-mono); font-size: 10px; letter-spacing: .2em; text-transform: uppercase; color: var(--ink-soft); padding: 0 8px; margin-bottom: -6px; }

.modes { display: flex; flex-direction: column; gap: 4px; }
.mode-btn, .nav-item {
  width: 100%; text-align: left; border: none; background: transparent; cursor: pointer;
  color: var(--ink); font-family: var(--font-ui); font-size: 14px;
  padding: 9px 12px; border-radius: 10px; display: flex; align-items: center; gap: 10px;
  transition: background .15s, color .15s, transform .1s;
}
.mode-btn .mi { font-size: 16px; width: 20px; text-align: center; }
.mode-btn:hover, .nav-item:hover { background: color-mix(in srgb, var(--accent) 10%, transparent); }
.mode-btn.active, .nav-item.active { background: var(--accent); color: #fff; }
[data-theme="dark"] .mode-btn.active, [data-theme="dark"] .nav-item.active { color: #14161f; font-weight: 600; }

.nav-list { display: flex; flex-direction: column; gap: 2px; }
.nav-item { position: relative; padding-right: 8px; }
.nav-item .ic { font-size: 15px; width: 22px; text-align: center; flex: none; }
.nav-item .nm { flex: 1; font-size: 13.5px; line-height: 1.3; overflow: hidden; }
.nav-item .badge-freq { font-size: 9px; }
.nav-item .mini { position: absolute; left: 12px; right: 8px; bottom: 3px; height: 2px; border-radius: 2px; background: var(--line); overflow: hidden; }
.nav-item .mini > i { display: block; height: 100%; background: var(--hot); width: 0; transition: width .5s; }
.nav-item.active .mini { background: rgba(255,255,255,.3); }
.nav-item.active .mini > i { background: #fff; }

.dot { width: 7px; height: 7px; border-radius: 50%; flex: none; }
.dot.done { background: var(--green); }
.dot.partial { background: var(--amber); }
.dot.none { background: var(--line); }

.sidebar-foot { margin-top: auto; display: flex; gap: 8px; padding: 0 6px; }
.icon-btn { flex: 1; border: 1px solid var(--line); background: var(--card); color: var(--ink-soft); border-radius: 10px; padding: 8px; cursor: pointer; font-family: var(--font-mono); font-size: 11px; transition: all .15s; }
.icon-btn:hover { color: var(--ink); border-color: var(--accent); }

/* ---------- Main ---------- */
.main { padding: 40px clamp(24px, 5vw, 72px) 120px; }
.content { max-width: var(--maxw); margin: 0 auto; }

.banner { background: color-mix(in srgb, var(--amber) 16%, var(--card)); border: 1px solid var(--amber); border-radius: 12px; padding: 12px 16px; font-size: 13px; margin-bottom: 24px; display: flex; align-items: center; gap: 10px; }
.banner .spin { width: 14px; height: 14px; border: 2px solid var(--amber); border-top-color: transparent; border-radius: 50%; animation: spin 1s linear infinite; flex: none; }
@keyframes spin { to { transform: rotate(360deg); } }

.topic-head { margin-bottom: 30px; border-bottom: 2px solid var(--ink); padding-bottom: 22px; position: relative; }
.topic-head .eyebrow { font-family: var(--font-mono); font-size: 11px; letter-spacing: .2em; text-transform: uppercase; color: var(--hot); display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
.topic-head h2 { font-family: var(--font-display); font-weight: 900; font-size: clamp(30px, 5vw, 46px); line-height: 1.04; letter-spacing: -.02em; }
.topic-head .summary { margin-top: 14px; font-size: 15.5px; color: var(--ink-soft); max-width: 62ch; }

.badge-freq { font-family: var(--font-mono); font-size: 10px; font-weight: 700; letter-spacing: .08em; padding: 2px 8px; border-radius: 100px; text-transform: uppercase; white-space: nowrap; }
.badge-freq.必考 { background: var(--hot); color: #fff; }
.badge-freq.高频 { background: var(--amber); color: #fff; }
.badge-freq.中频 { background: color-mix(in srgb, var(--ink-soft) 25%, transparent); color: var(--ink); }

/* must-know */
.mustknow { background: var(--card); border: 1px solid var(--line); border-left: 4px solid var(--amber); border-radius: var(--radius); margin-bottom: 34px; box-shadow: var(--shadow); overflow: hidden; }
.mustknow > summary { cursor: pointer; list-style: none; padding: 16px 20px; font-family: var(--font-display); font-weight: 600; font-size: 18px; display: flex; align-items: center; gap: 10px; }
.mustknow > summary::-webkit-details-marker { display: none; }
.mustknow > summary .chev { margin-left: auto; transition: transform .2s; color: var(--ink-soft); }
.mustknow[open] > summary .chev { transform: rotate(180deg); }
.mustknow .mk-body { padding: 4px 20px 20px; columns: 2; column-gap: 28px; }
.mustknow ul { list-style: none; }
.mustknow li { break-inside: avoid; font-size: 13.5px; padding: 7px 0 7px 20px; position: relative; border-bottom: 1px dashed var(--line); }
.mustknow li::before { content: "▸"; position: absolute; left: 0; color: var(--amber); }
@media (max-width: 720px) { .mustknow .mk-body { columns: 1; } }

/* filter bar */
.filterbar { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; margin-bottom: 22px; }
.chip { font-family: var(--font-mono); font-size: 11.5px; border: 1px solid var(--line); background: var(--card); color: var(--ink-soft); padding: 6px 12px; border-radius: 100px; cursor: pointer; transition: all .15s; }
.chip:hover { border-color: var(--accent); color: var(--ink); }
.chip.on { background: var(--accent); color: #fff; border-color: var(--accent); }
[data-theme="dark"] .chip.on { color: #14161f; }
.filterbar .spacer { flex: 1; }
.count-tag { font-family: var(--font-mono); font-size: 11.5px; color: var(--ink-soft); }

/* problem card */
.card { background: var(--card); border: 1px solid var(--line); border-radius: var(--radius); margin-bottom: 18px; box-shadow: var(--shadow); overflow: hidden; transition: box-shadow .2s, transform .2s, border-color .2s; opacity: 0; transform: translateY(14px); animation: rise .5s forwards; }
@keyframes rise { to { opacity: 1; transform: none; } }
.card:hover { box-shadow: var(--shadow-lift); }
.card.mastered { border-color: var(--green); }
.card.mastered::after { content: "✓ 已掌握"; position: absolute; }
.card-top { display: flex; align-items: center; gap: 9px; padding: 13px 18px 0; flex-wrap: wrap; }
.qnum { font-family: var(--font-mono); font-weight: 700; font-size: 13px; color: var(--accent); }
.tag { font-family: var(--font-mono); font-size: 10px; font-weight: 600; padding: 2px 8px; border-radius: 6px; letter-spacing: .03em; }
.tag.type { background: color-mix(in srgb, var(--accent) 14%, transparent); color: var(--accent); }
.tag.src { background: transparent; border: 1px solid var(--line); color: var(--ink-soft); }
.tag.diff.基础 { background: color-mix(in srgb, var(--green) 18%, transparent); color: var(--green); }
.tag.diff.中等 { background: color-mix(in srgb, var(--accent) 16%, transparent); color: var(--accent); }
.tag.diff.拔高 { background: color-mix(in srgb, var(--hot) 16%, transparent); color: var(--hot); }
.master-toggle { margin-left: auto; display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--ink-soft); cursor: pointer; user-select: none; }
.master-toggle input { display: none; }
.master-toggle .box { width: 17px; height: 17px; border: 1.5px solid var(--line); border-radius: 5px; display: grid; place-items: center; font-size: 11px; color: transparent; transition: all .15s; }
.master-toggle:hover .box { border-color: var(--green); }
.master-toggle input:checked + .box { background: var(--green); border-color: var(--green); color: #fff; }

.q-body { padding: 12px 18px 16px; font-size: 15.5px; }
.q-body p { margin: 0 0 6px; }
.actions { padding: 0 18px 16px; display: flex; gap: 10px; align-items: center; }
.btn-sol { font-family: var(--font-mono); font-size: 12.5px; border: 1px solid var(--accent); color: var(--accent); background: transparent; padding: 7px 16px; border-radius: 9px; cursor: pointer; transition: all .15s; display: inline-flex; align-items: center; gap: 7px; }
.btn-sol:hover { background: var(--accent); color: #fff; }
[data-theme="dark"] .btn-sol:hover { color: #14161f; }
.btn-sol .chev { transition: transform .2s; }
.btn-sol.open .chev { transform: rotate(180deg); }
.answer-quick { font-size: 13px; color: var(--ink-soft); font-family: var(--font-mono); }
.answer-quick b { color: var(--green); }

.solution { border-top: 1px dashed var(--line); background: color-mix(in srgb, var(--accent) 4%, var(--card)); padding: 0 18px; max-height: 0; overflow: hidden; transition: max-height .35s ease, padding .35s ease; }
.solution.show { padding: 18px; max-height: none; }
.solution .sol-label { font-family: var(--font-mono); font-size: 10px; letter-spacing: .2em; text-transform: uppercase; color: var(--hot); margin-bottom: 10px; }
.solution .sol-label.ans { color: var(--green); }
.sol-content { font-size: 14.5px; }
.sol-content p { margin: 0 0 10px; }
.ans-line { background: color-mix(in srgb, var(--green) 10%, transparent); border-left: 3px solid var(--green); padding: 8px 12px; border-radius: 6px; margin-bottom: 16px; font-size: 14px; }

/* empty / loading states */
.empty { text-align: center; padding: 80px 20px; color: var(--ink-soft); }
.empty .big { font-size: 40px; margin-bottom: 14px; }

/* exam mode */
.exam-head { text-align: center; margin-bottom: 26px; }
.exam-head h2 { font-family: var(--font-display); font-weight: 900; font-size: 40px; }
.exam-controls { display: flex; gap: 12px; justify-content: center; align-items: center; flex-wrap: wrap; margin-bottom: 30px; }
.timer { font-family: var(--font-mono); font-size: 22px; font-weight: 700; padding: 6px 16px; border: 1px solid var(--line); border-radius: 10px; background: var(--card); }
.btn-primary { font-family: var(--font-ui); font-weight: 600; font-size: 14px; background: var(--hot); color: #fff; border: none; padding: 11px 24px; border-radius: 10px; cursor: pointer; transition: transform .1s, filter .15s; }
.btn-primary:hover { filter: brightness(1.05); }
.btn-primary:active { transform: scale(.97); }
.btn-ghost { font-family: var(--font-ui); font-size: 14px; background: var(--card); color: var(--ink); border: 1px solid var(--line); padding: 11px 22px; border-radius: 10px; cursor: pointer; }
.btn-ghost:hover { border-color: var(--accent); }
.exam-section-title { font-family: var(--font-display); font-weight: 600; font-size: 22px; margin: 30px 0 14px; padding-bottom: 8px; border-bottom: 1px solid var(--line); }

/* cheatsheet */
.cheat-group { margin-bottom: 30px; }
.cheat-group h3 { font-family: var(--font-display); font-weight: 600; font-size: 20px; margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }
.cheat-group ul { list-style: none; background: var(--card); border: 1px solid var(--line); border-radius: 12px; padding: 8px 18px; box-shadow: var(--shadow); }
.cheat-group li { padding: 8px 0 8px 20px; position: relative; font-size: 14px; border-bottom: 1px dashed var(--line); }
.cheat-group li:last-child { border-bottom: none; }
.cheat-group li::before { content: "▸"; position: absolute; left: 0; color: var(--amber); }

/* proof guide */
.pg-card { background: var(--card); border: 1px solid var(--line); border-radius: var(--radius); box-shadow: var(--shadow); margin-bottom: 22px; padding: 22px; opacity: 0; transform: translateY(14px); animation: rise .5s forwards; }
.pg-head { display: flex; align-items: center; gap: 10px; border-bottom: 2px solid var(--ink); padding-bottom: 12px; margin-bottom: 16px; flex-wrap: wrap; }
.pg-head h3 { font-family: var(--font-display); font-weight: 700; font-size: 21px; }
.pg-pts { margin-left: auto; font-family: var(--font-mono); font-size: 12px; font-weight: 700; color: var(--hot); }
.pg-sec { margin-bottom: 16px; }
.pg-sec:last-child { margin-bottom: 0; }
.pg-lab { font-family: var(--font-mono); font-size: 11px; letter-spacing: .1em; font-weight: 700; margin-bottom: 8px; }
.pg-lab.sig { color: var(--accent); }
.pg-lab.ske { color: var(--amber); }
.pg-lab.stp { color: var(--green); }
.pg-lab.ex, .pg-lab.pit { color: var(--hot); }
.pg-ul, .pg-ol { padding-left: 22px; margin: 0; }
.pg-ul { list-style: none; }
.pg-ul li { position: relative; padding: 5px 0; font-size: 14px; line-height: 1.65; }
.pg-ul.ske li::before { content: "▪"; position: absolute; left: -16px; color: var(--amber); }
.pg-ul.pit li::before { content: "!"; position: absolute; left: -15px; color: var(--hot); font-weight: 800; }
.pg-ol li { padding: 4px 0; font-size: 14px; line-height: 1.65; }
.pg-sig { font-size: 14.5px; }
.pg-sec.example { background: color-mix(in srgb, var(--accent) 5%, var(--card)); border: 1px dashed var(--line); border-radius: 10px; padding: 16px; }
.pg-q { font-size: 14.5px; margin-bottom: 12px; padding-bottom: 12px; border-bottom: 1px dashed var(--line); }
.pg-sollab { font-family: var(--font-mono); font-size: 10px; letter-spacing: .2em; color: var(--green); margin-bottom: 8px; }
.pg-sol { font-size: 14px; }

mjx-container { overflow-x: auto; overflow-y: hidden; max-width: 100%; }

/* mobile */
.menu-toggle { display: none; }
@media (max-width: 880px) {
  .app { grid-template-columns: 1fr; }
  .sidebar { position: fixed; z-index: 50; width: 296px; transform: translateX(-100%); transition: transform .25s; }
  .sidebar.open { transform: none; }
  .menu-toggle { display: grid; place-items: center; position: fixed; z-index: 60; top: 14px; left: 14px; width: 44px; height: 44px; border-radius: 12px; background: var(--accent); color: #fff; border: none; font-size: 20px; cursor: pointer; box-shadow: var(--shadow-lift); }
  .main { padding-top: 70px; }
  .scrim { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.4); z-index: 40; }
  .scrim.show { display: block; }
}

/* ===== 专题精讲 · 难点突破 (scoped) ===== */
.special-wrap{--crimson:#b3322c;--crimson-d:#8f2520;--gold:#b8862f;--teal:#2f6f6a;--indigo:#3a4a8c;--paper:#f7f4ec;--paper2:#fffdf8;--ink:#23201b;--ink2:#5c554a;--line:#e3ddd0;--line2:#d6cfbf;--shadow:0 2px 8px rgba(0,0,0,.06);color:var(--ink);font-family:inherit}
.special-wrap .chapter-title{font-family:var(--font-display,serif);font-weight:900;font-size:24px;color:var(--crimson-d);display:flex;align-items:center;gap:10px;margin:0 0 6px}
.special-wrap .cnum-t{display:grid;place-items:center;width:30px;height:30px;border-radius:8px;background:var(--gold);color:#fff;font-weight:900;font-size:16px}
.special-wrap .special-intro{font-size:14px;line-height:1.8;color:var(--ink2);background:var(--paper2);border:1px solid var(--line);border-left:4px solid var(--gold);border-radius:10px;padding:12px 16px;margin:0 0 8px}
.special-wrap mjx-container{overflow-x:auto;overflow-y:hidden;max-width:100%}
.special-wrap .topic-mod{margin-top:30px;padding-top:8px;scroll-margin-top:74px}
.special-wrap .mod-title{font-family:"Noto Serif SC",serif;font-weight:900;font-size:21px;color:var(--crimson-d);margin:0 0 10px;padding:8px 14px;background:linear-gradient(100deg,#fbeeea,#fff7e8);border-radius:10px;border-left:5px solid var(--crimson)}
.special-wrap .mod-sub{font-family:"Noto Serif SC",serif;font-weight:700;font-size:16px;color:var(--ink);margin:24px 0 12px;display:flex;align-items:center;gap:8px}
.special-wrap .mantra{margin:10px 0 4px;padding:12px 16px;background:linear-gradient(100deg,#fff7e8,#fdf4e3);border:1px solid #ecd9ad;border-radius:10px;font-family:"Noto Serif SC",serif;font-weight:700;font-size:16px;color:var(--crimson-d)}
.special-wrap .mantra::before{content:"口诀 · ";color:var(--gold)}
.special-wrap .weapon-grid{display:flex;flex-direction:column;gap:14px}
.special-wrap .weapon{background:var(--paper2);border:1px solid var(--line);border-radius:12px;padding:14px 16px;box-shadow:var(--shadow)}
.special-wrap .w-name{font-family:"Noto Serif SC",serif;font-weight:700;font-size:16px;color:var(--crimson-d);margin-bottom:8px}
.special-wrap .w-def, .special-wrap .w-prove{font-size:14px;margin:6px 0;line-height:1.7}
.special-wrap .w-lab{display:inline-block;font-size:11px;font-weight:700;padding:1px 8px;border-radius:5px;margin-right:6px;vertical-align:1px}
.special-wrap .w-def .w-lab{background:#eef2fb;color:var(--indigo)}
.special-wrap .w-prove{background:#f7fbfa;border:1px dashed #bfdad6;border-radius:8px;padding:8px 10px}
.special-wrap .w-prove .w-lab{background:#eaf3f2;color:var(--teal)}
.special-wrap .box{background:var(--paper2);border:1px solid var(--line);border-radius:12px;padding:16px 18px;box-shadow:var(--shadow);font-size:14.5px;line-height:1.75}
.special-wrap .box ul, .special-wrap .box ol{padding-left:22px;margin:8px 0}
.special-wrap .box li{margin:5px 0}
.special-wrap .box.recipe{border-left:4px solid var(--gold)}
.special-wrap .box.tools{border-left:4px solid var(--indigo)}
.special-wrap .box.check{border-left:4px solid var(--teal);background:#fbfdfc}
.special-wrap .tprob{background:var(--paper2);border:1px solid var(--line);border-radius:14px;padding:18px 20px;margin-bottom:16px;box-shadow:var(--shadow);scroll-margin-top:74px}

<body>
<button class="menu-toggle" id="menuToggle">☰</button>
<div class="scrim" id="scrim"></div>
<div class="app">
  <aside class="sidebar" id="sidebar">
    <div class="brand">
      <span class="kicker">期末速成 · 不挂科</span>
      <h1>离散数学<br>刷题站</h1>
      <span class="sub" id="brandSub">屈婉玲版 · 哈工程真题</span>
    </div>

    <div class="progress-wrap">
      <div class="ring">
        <svg width="56" height="56" viewBox="0 0 56 56">
          <circle class="track" cx="28" cy="28" r="24" fill="none" stroke-width="6"></circle>
          <circle class="fill" id="ringFill" cx="28" cy="28" r="24" fill="none" stroke-width="6" stroke-dasharray="150.8" stroke-dashoffset="150.8"></circle>
        </svg>
        <span class="pct" id="ringPct">0%</span>
      </div>
      <div class="progress-meta">
        <div>已掌握 <b id="doneCount">0</b> / <b id="totalCount">0</b> 题</div>
        <div style="margin-top:4px;">坚持就稳过 💪</div>
      </div>
    </div>

    <div class="modes">
      <span class="nav-section-label">模式</span>
      <button class="mode-btn" data-mode="special"><span class="mi">🎯</span>专题精讲·难点突破</button>
      <button class="mode-btn" data-mode="cheat"><span class="mi">⚡</span>考前速记(必背)</button>
      <button class="mode-btn" data-mode="exam"><span class="mi">📝</span>模拟考试</button>
    </div>

    <div>
      <span class="nav-section-label">考点专题</span>
      <div class="nav-list" id="navList"></div>
    </div>

    <div class="sidebar-foot">
      <button class="icon-btn" id="themeBtn">🌙 夜读</button>
      <button class="icon-btn" id="resetBtn">↺ 清进度</button>
    </div>
  </aside>

  <main class="main">
    <div class="content" id="content"></div>
  </main>
</div>

<script src="data.js"></script>
<script src="special.js"></script>
<script>
const DATA = window.STUDY_DATA || { topics: [] };
const LS_KEY = 'dm_mastered_v1';
const LS_THEME = 'dm_theme_v1';
const FREQ_ORDER = { '必考': 0, '高频': 1, '中频': 2 };

let mastered = new Set();
try { mastered = new Set(JSON.parse(localStorage.getItem(LS_KEY) || '[]')); } catch (e) {}
function saveMastered() { localStorage.setItem(LS_KEY, JSON.stringify([...mastered])); }

let state = { view: 'topic', topicId: (DATA.topics[0] || {}).id, filterDiff: 'all', filterType: 'all', onlyUndone: false };

/* ---------- rich text: protect math -> markdown -> restore -> typeset ---------- */
function renderRich(src, el) {
  if (src == null) src = '';
  const math = [];
  let s = String(src).replace(/\$\$[\s\S]*?\$\$|\\\[[\s\S]*?\\\]|\$[^$\n]*?\$|\\\([\s\S]*?\\\)/g, m => {
    math.push(m); return '@@MJX' + (math.length - 1) + '@@';
  });
  let html;
  try { html = window.marked ? marked.parse(s) : s.replace(/\n/g, '<br>'); }
  catch (e) { html = s.replace(/\n/g, '<br>'); }
  html = html.replace(/@@MJX(\d+)@@/g, (_, i) => math[+i]);
  el.innerHTML = html;
  typeset(el);
}
let mjReady = false;
function typeset(el) {
  if (window.MathJax && MathJax.typesetPromise && MathJax.startup) {
    MathJax.startup.promise = (MathJax.startup.promise || Promise.resolve())
      .then(() => MathJax.typesetPromise([el])).catch(() => {});
  } else {
    setTimeout(() => typeset(el), 300);
  }
}

/* ---------- stats ---------- */
function allProblems() { return DATA.topics.flatMap(t => (t.problems || []).map(p => ({ ...p, _topic: t.name }))); }
function topicStats(t) {
  const ps = t.problems || []; const done = ps.filter(p => mastered.has(p.id)).length;
  return { done, total: ps.length };
}
function updateProgress() {
  const all = allProblems(); const total = all.length;
  const done = all.filter(p => mastered.has(p.id)).length;
  const pct = total ? Math.round(done / total * 100) : 0;
  document.getElementById('doneCount').textContent = done;
  document.getElementById('totalCount').textContent = total;
  document.getElementById('ringPct').textContent = pct + '%';
  const C = 2 * Math.PI * 24;
  document.getElementById('ringFill').style.strokeDashoffset = C * (1 - pct / 100);
  document.querySelectorAll('.nav-item').forEach(el => {
    const t = DATA.topics.find(x => x.id === el.dataset.id); if (!t) return;
    const s = topicStats(t); const p = s.total ? s.done / s.total : 0;
    const bar = el.querySelector('.mini > i'); if (bar) bar.style.width = (p * 100) + '%';
    const dot = el.querySelector('.dot');
    if (dot) { dot.className = 'dot ' + (s.done === 0 ? 'none' : s.done === s.total ? 'done' : 'partial'); }
  });
}

/* ---------- sidebar nav ---------- */
function buildNav() {
  const nav = document.getElementById('navList');
  nav.innerHTML = '';
  DATA.topics.slice().sort((a, b) => (a.order || 0) - (b.order || 0)).forEach(t => {
    const b = document.createElement('button');
    b.className = 'nav-item'; b.dataset.id = t.id;
    b.innerHTML = `<span class="ic">${t.icon || '•'}</span>
      <span class="nm">${t.name}</span>
      <span class="dot none"></span>
      <span class="badge-freq ${t.freq}">${t.freq}</span>
      <span class="mini"><i></i></span>`;
    b.onclick = () => { state.view = 'topic'; state.topicId = t.id; render(); closeMobile(); };
    nav.appendChild(b);
  });
}
function syncNavActive() {
  document.querySelectorAll('.nav-item').forEach(el => el.classList.toggle('active', state.view === 'topic' && el.dataset.id === state.topicId));
  document.querySelectorAll('.mode-btn').forEach(el => el.classList.toggle('active', el.dataset.mode === state.view));
}

/* ---------- problem card ---------- */
function problemCard(p, idx) {
  const card = document.createElement('div');
  card.className = 'card' + (mastered.has(p.id) ? ' mastered' : '');
  card.style.animationDelay = Math.min(idx * 45, 400) + 'ms';
  card.innerHTML = `
    <div class="card-top">
      <span class="qnum">${String(idx + 1).padStart(2, '0')}</span>
      <span class="tag type">${p.type || ''}</span>
      <span class="tag src">${p.source || ''}</span>
      <span class="tag diff ${p.difficulty}">${p.difficulty || ''}</span>
      <label class="master-toggle">
        <input type="checkbox" ${mastered.has(p.id) ? 'checked' : ''}>
        <span class="box">✓</span><span>掌握</span>
      </label>
    </div>
    <div class="q-body"></div>
    <div class="actions">
      <button class="btn-sol"><span>显示解答</span><span class="chev">▾</span></button>
    </div>
    <div class="solution">
      <div class="ans-line"></div>
      <div class="sol-label">解题过程</div>
      <div class="sol-content"></div>
    </div>`;
  renderRich(p.question, card.querySelector('.q-body'));

  const chk = card.querySelector('input');
  chk.onchange = () => {
    if (chk.checked) mastered.add(p.id); else mastered.delete(p.id);
    card.classList.toggle('mastered', chk.checked);
    saveMastered(); updateProgress();
  };

  const sol = card.querySelector('.solution');
  const btn = card.querySelector('.btn-sol');
  let rendered = false;
  btn.onclick = () => {
    const open = sol.classList.toggle('show');
    btn.classList.toggle('open', open);
    btn.querySelector('span').textContent = open ? '收起解答' : '显示解答';
    if (open && !rendered) {
      rendered = true;
      const ans = card.querySelector('.ans-line');
      renderRich('**答案:** ' + (p.answer || '见解题过程'), ans);
      renderRich(p.solution, card.querySelector('.sol-content'));
    }
  };
  return card;
}

/* ---------- views ---------- */
function render() {
  syncNavActive();
  const root = document.getElementById('content');
  if (state.view === 'topic') renderTopic(root);
  else if (state.view === 'cheat') renderCheat(root);
  else if (state.view === 'exam') renderExam(root);
  else if (state.view === 'special') renderSpecial(root);
  updateProgress();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function banner() {
  if (!DATA.placeholder) return '';
  return `<div class="banner"><span class="spin"></span>题库正在后台生成,当前为<b>&nbsp;示例数据&nbsp;</b>。生成完成后刷新页面即可看到全部真题与新编题。</div>`;
}

function renderTopic(root) {
  const t = DATA.topics.find(x => x.id === state.topicId) || DATA.topics[0];
  if (!t) { root.innerHTML = '<div class="empty"><div class="big">📭</div>暂无题库数据</div>'; return; }
  let ps = (t.problems || []).slice();
  if (state.filterDiff !== 'all') ps = ps.filter(p => p.difficulty === state.filterDiff);
  if (state.filterType !== 'all') ps = ps.filter(p => p.type === state.filterType);
  if (state.onlyUndone) ps = ps.filter(p => !mastered.has(p.id));

  const types = [...new Set((t.problems || []).map(p => p.type))];
  root.innerHTML = banner() + `
    <div class="topic-head">
      <div class="eyebrow"><span>专题 ${String(t.order || 0).padStart(2, '0')}</span><span class="badge-freq ${t.freq}">${t.freq}</span></div>
      <h2>${t.icon || ''} ${t.name}</h2>
      <p class="summary">${t.summary || ''}</p>
    </div>
    <details class="mustknow" open>
      <summary>📌 必背速查 / 解题模板 <span class="chev">▾</span></summary>
      <div class="mk-body"><ul id="mkList"></ul></div>
    </details>
    <div class="filterbar" id="filterbar"></div>
    <div id="probList"></div>`;

  const mk = root.querySelector('#mkList');
  (t.mustKnow || []).forEach(item => { const li = document.createElement('li'); renderRich(item, li); mk.appendChild(li); });

  // filter bar
  const fb = root.querySelector('#filterbar');
  const diffs = ['all', '基础', '中等', '拔高'];
  diffs.forEach(d => {
    const c = document.createElement('button'); c.className = 'chip' + (state.filterDiff === d ? ' on' : '');
    c.textContent = d === 'all' ? '全部难度' : d;
    c.onclick = () => { state.filterDiff = d; renderTopic(root); }; fb.appendChild(c);
  });
  const sep = document.createElement('span'); sep.style.cssText = 'width:1px;height:18px;background:var(--line);margin:0 4px;'; fb.appendChild(sep);
  ['all', ...types].forEach(ty => {
    const c = document.createElement('button'); c.className = 'chip' + (state.filterType === ty ? ' on' : '');
    c.textContent = ty === 'all' ? '全部题型' : ty;
    c.onclick = () => { state.filterType = ty; renderTopic(root); }; fb.appendChild(c);
  });
  const undo = document.createElement('button'); undo.className = 'chip' + (state.onlyUndone ? ' on' : '');
  undo.textContent = '只看未掌握'; undo.onclick = () => { state.onlyUndone = !state.onlyUndone; renderTopic(root); }; fb.appendChild(undo);
  const spacer = document.createElement('span'); spacer.className = 'spacer'; fb.appendChild(spacer);
  const ct = document.createElement('span'); ct.className = 'count-tag'; ct.textContent = ps.length + ' 题'; fb.appendChild(ct);

  const list = root.querySelector('#probList');
  if (!ps.length) { list.innerHTML = '<div class="empty"><div class="big">🎉</div>这一类都掌握啦,换个筛选看看</div>'; return; }
  ps.forEach((p, i) => list.appendChild(problemCard(p, i)));
}

function renderCheat(root) {
  root.innerHTML = banner() + `
    <div class="topic-head">
      <div class="eyebrow"><span>CHEAT SHEET</span></div>
      <h2>⚡ 考前速记</h2>
      <p class="summary">所有专题的必背公式与解题模板汇总,进考场前最后扫一遍。</p>
    </div>
    <div id="cheatBody"></div>`;
  const body = root.querySelector('#cheatBody');
  DATA.topics.slice().sort((a, b) => (a.order || 0) - (b.order || 0)).forEach(t => {
    if (!(t.mustKnow || []).length) return;
    const g = document.createElement('div'); g.className = 'cheat-group';
    g.innerHTML = `<h3>${t.icon || ''} ${t.name} <span class="badge-freq ${t.freq}">${t.freq}</span></h3><ul></ul>`;
    const ul = g.querySelector('ul');
    t.mustKnow.forEach(item => { const li = document.createElement('li'); renderRich(item, li); ul.appendChild(li); });
    body.appendChild(g);
  });
}

/* ---------- 专题精讲 · 难点突破 ---------- */
function renderSpecial(root) {
  const html = window.SPECIAL_HTML;
  if (!html) { root.innerHTML = '<div class="empty"><div class="big">📭</div>专题精讲数据未加载</div>'; return; }
  root.innerHTML = '<div class="special-wrap">' + html + '</div>';
  root.querySelectorAll('.tprob, .trap').forEach(pp => {
    [['.rv-idea', '.tp-idea'], ['.rv-proof', '.tp-proof'], ['.rv-trap', '.trap-a']].forEach(pair => {
      const b = pp.querySelector(pair[0]), x = pp.querySelector(pair[1]);
      if (b && x) b.addEventListener('click', () => { const on = x.classList.toggle('show'); b.classList.toggle('on', on); });
    });
  });
  root.querySelectorAll('.learned-cb').forEach(cb => {
    const id = 'sp_' + cb.dataset.id, pp = cb.closest('.tprob');
    if (mastered.has(id)) { cb.checked = true; if (pp) pp.classList.add('learned-on'); }
    cb.addEventListener('change', () => {
      if (cb.checked) mastered.add(id); else mastered.delete(id);
      if (pp) pp.classList.toggle('learned-on', cb.checked);
      saveMastered(); updateProgress();
    });
  });
  typeset(root);
}

/* ---------- exam mode ---------- */
let examTimer = null, examSeconds = 0;
function pick(arr, n) { const a = arr.slice(); const out = []; while (a.length && out.length < n) { out.push(a.splice(Math.floor(Math.random() * a.length), 1)[0]); } return out; }
function renderExam(root) {
  if (examTimer) { clearInterval(examTimer); examTimer = null; }
  root.innerHTML = banner() + `
    <div class="exam-head">
      <h2>📝 模拟考试</h2>
      <p class="summary" style="margin:10px auto 0;">按真实卷面随机抽题(填空·判断·计算·证明),计时作答,做完一键看全部解答。</p>
    </div>
    <div class="exam-controls">
      <div class="timer" id="timer">00:00</div>
      <button class="btn-primary" id="startExam">生成一套卷子</button>
      <button class="btn-ghost" id="revealAll" style="display:none;">显示全部解答</button>
    </div>
    <div id="examBody"></div>`;
  root.querySelector('#startExam').onclick = () => startExam(root);
}
function startExam(root) {
  const all = allProblems();
  const plan = [['填空', 5], ['判断', 5], ['计算', 3], ['证明', 4]];
  const body = root.querySelector('#examBody'); body.innerHTML = '';
  let n = 0;
  plan.forEach(([type, k]) => {
    const pool = all.filter(p => p.type === type);
    const chosen = pick(pool, k); if (!chosen.length) return;
    const sec = document.createElement('div');
    const title = document.createElement('div'); title.className = 'exam-section-title';
    title.textContent = `${['一', '二', '三', '四', '五'][body.children.length] || ''}、${type}题`;
    body.appendChild(title);
    chosen.forEach(p => { body.appendChild(problemCard(p, n++)); });
  });
  if (!n) { body.innerHTML = '<div class="empty"><div class="big">📭</div>题库还在生成,稍后再来考</div>'; return; }
  examSeconds = 0;
  const tEl = root.querySelector('#timer');
  examTimer = setInterval(() => { examSeconds++; const m = String(Math.floor(examSeconds / 60)).padStart(2, '0'); const s = String(examSeconds % 60).padStart(2, '0'); tEl.textContent = m + ':' + s; }, 1000);
  root.querySelector('#startExam').textContent = '换一套';
  const rev = root.querySelector('#revealAll'); rev.style.display = '';
  rev.onclick = () => { body.querySelectorAll('.btn-sol').forEach(b => { if (!b.classList.contains('open')) b.click(); }); };
}

/* ---------- modes & controls ---------- */
document.querySelectorAll('.mode-btn').forEach(b => b.onclick = () => { state.view = b.dataset.mode; render(); closeMobile(); });
document.getElementById('themeBtn').onclick = () => {
  const cur = document.documentElement.getAttribute('data-theme');
  const next = cur === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem(LS_THEME, next);
  document.getElementById('themeBtn').textContent = next === 'dark' ? '☀️ 日间' : '🌙 夜读';
};
document.getElementById('resetBtn').onclick = () => {
  if (confirm('确定清空所有"已掌握"标记?')) { mastered.clear(); saveMastered(); render(); }
};
const savedTheme = localStorage.getItem(LS_THEME);
if (savedTheme) { document.documentElement.setAttribute('data-theme', savedTheme); document.getElementById('themeBtn').textContent = savedTheme === 'dark' ? '☀️ 日间' : '🌙 夜读'; }

/* mobile */
const sidebar = document.getElementById('sidebar'), scrim = document.getElementById('scrim');
function closeMobile() { sidebar.classList.remove('open'); scrim.classList.remove('show'); }
document.getElementById('menuToggle').onclick = () => { sidebar.classList.add('open'); scrim.classList.add('show'); };
scrim.onclick = closeMobile;

/* meta */
if (DATA.meta) document.getElementById('brandSub').textContent = `${DATA.meta.textbook || ''} · ${DATA.meta.school || ''}真题`;

/* init */
(function initHash() {
  const h = (location.hash || '').replace('#', '');
  if (['proof','special','cheat','exam'].includes(h)) state.view = (h==='proof'?'special':h);
  else if (h && DATA.topics.find(t => t.id === h)) { state.view = 'topic'; state.topicId = h; }
})();
buildNav();
render();
</script>
<script>
/* ===== 彩蛋 & 趣味机制 ===== */
(function(){
  // ---- styles ----
  var st=document.createElement('style');
  st.textContent=
  '.toast-wrap{position:fixed;left:50%;bottom:30px;transform:translateX(-50%);z-index:9999;display:flex;flex-direction:column;gap:8px;align-items:center;pointer-events:none}'
  +'.toast{background:rgba(28,30,42,.94);color:#fff;padding:10px 18px;border-radius:12px;font-size:14px;font-weight:600;box-shadow:0 8px 26px rgba(0,0,0,.3);opacity:0;transform:translateY(14px);transition:.32s;max-width:86vw;text-align:center}'
  +'.toast.show{opacity:1;transform:translateY(0)}'
  +'.toast.ach{background:linear-gradient(100deg,#b8862f,#b3322c);font-size:15px}'
  +'.fx-emoji{position:fixed;top:-40px;font-size:26px;z-index:9998;pointer-events:none;animation:fxfall linear forwards}'
  +'@keyframes fxfall{to{transform:translateY(110vh) rotate(360deg);opacity:.85}}'
  +'.luck-modal{position:fixed;inset:0;z-index:10000;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,.45)}'
  +'.luck-modal.show{display:flex}'
  +'.luck-card{background:#fffdf8;color:#23201b;width:min(340px,86vw);border-radius:18px;padding:26px 24px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.4);border:2px solid #e3ddd0;animation:luckin .35s}'
  +'@keyframes luckin{from{transform:scale(.8);opacity:0}to{transform:scale(1);opacity:1}}'
  +'.luck-card .lvl{font-family:serif;font-weight:900;font-size:40px;color:#b3322c;margin:4px 0 8px}'
  +'.luck-card .msg{font-size:15px;line-height:1.8;margin:8px 0}'
  +'.luck-card .yj{font-size:13px;color:#5c554a;margin-top:10px}'
  +'.luck-card button{margin-top:16px;border:none;background:#b3322c;color:#fff;padding:9px 22px;border-radius:10px;font-size:14px;cursor:pointer;font-family:inherit}'
  +'.brand h1{cursor:pointer;position:relative}.brand h1:hover{filter:brightness(1.08)}';
  document.head.appendChild(st);

  var wrap=document.createElement('div');wrap.className='toast-wrap';document.body.appendChild(wrap);
  function toast(msg,cls){var t=document.createElement('div');t.className='toast'+(cls?' '+cls:'');t.innerHTML=msg;wrap.appendChild(t);
    requestAnimationFrame(function(){t.classList.add('show');});
    setTimeout(function(){t.classList.remove('show');setTimeout(function(){t.remove();},350);},cls==='ach'?2600:1700);}

  function rain(emojis,n){for(var i=0;i<n;i++){(function(k){setTimeout(function(){
    var e=document.createElement('div');e.className='fx-emoji';e.textContent=emojis[k%emojis.length];
    e.style.left=(Math.random()*98)+'vw';var d=2.2+Math.random()*2.2;e.style.animationDuration=d+'s';
    document.body.appendChild(e);setTimeout(function(){e.remove();},d*1000+200);},k*70);})(i);}}

  // ---- learn toasts + milestones (hook updateProgress) ----
  var LEARN=['又拿下一道 ✅','稳!这题再也跑不掉了 📈','+1 经验值,离上岸更近了 🏊','这题会了,考场上就是送分 🎁','套路记住了,它就是你的了 💪','学神进度 +1 🧠','漂亮,继续连击 🔥'];
  var ACH=[[10,'🌱 成就解锁:小试牛刀'],[25,'🔥 成就解锁:渐入佳境'],[50,'⚔️ 成就解锁:半壁江山'],[75,'🚀 成就解锁:胜券在握'],[100,'🏆 成就解锁:全员上岸!离散数学被你拿下了!']];
  var seen={};try{seen=JSON.parse(localStorage.getItem('dm_ach_v1')||'{}');}catch(e){}
  function fireMs(pct){ACH.forEach(function(a){if(pct>=a[0]&&!seen[a[0]]){seen[a[0]]=1;localStorage.setItem('dm_ach_v1',JSON.stringify(seen));
    toast(a[1],'ach');if(a[0]>=50)rain(['🎉','✨','📚','🎓','💯'],a[0]>=100?40:16);}});}
  window.__celebrate=function(){toast(LEARN[Math.floor(Math.random()*LEARN.length)]);};

  var last=-1;
  function readDone(){return parseInt((document.getElementById('doneCount')||{}).textContent)||0;}
  function readTot(){return parseInt((document.getElementById('totalCount')||{}).textContent)||0;}
  var orig=window.updateProgress;
  window.updateProgress=function(){var r=orig.apply(this,arguments);var dc=readDone(),tc=readTot();
    if(last>=0&&dc>last){window.__celebrate();}
    if(tc>0){var pct=Math.round(100*dc/tc);fireMs(pct);}
    last=dc;return r;};
  setTimeout(function(){last=readDone();},300);

  // ---- 考运签 fortune (click brand title) ----
  var FORT=[
   ['大吉','主析取范式一遍过,监考老师对你笑。','宜:写满步骤分 · 忌:跳步'],
   ['大吉','双射证明单满两开花,反函数自己跳出来。','宜:先单射后满射 · 忌:只证一半'],
   ['中吉','群论四步闭合验,逆元单位元手到擒来。','宜:先验封闭性 · 忌:漏结合律'],
   ['中吉','画哈斯图手不抖,偏序关系样样有。','宜:标全极大极小 · 忌:连错盖住关系'],
   ['吉','复合函数记牢"先F后G",屈婉玲附体。','宜:写清复合方向 · 忌:顺序写反'],
   ['吉','握手定理 Σd=2m,图论填空闭眼拿。','宜:数清奇度点 · 忌:忘了自环算两度'],
   ['小吉','真值表不会错,就是有点慢,带块表去。','宜:稳扎稳打 · 忌:慌'],
   ['末吉','梦到了环和域……醒醒,今年不考!','宜:只背会考的 · 忌:钻牛角尖'],
   ['大吉','等价关系三件套,自反对称传递全跑过。','宜:逐条"任取…由定义…" · 忌:漏证一条']
  ];
  var lm=document.createElement('div');lm.className='luck-modal';
  lm.innerHTML='<div class="luck-card"><div style="font-size:13px;letter-spacing:.3em;color:#b8862f;font-weight:700">离散数学 · 考运签</div><div class="lvl" id="luckLvl"></div><div class="msg" id="luckMsg"></div><div class="yj" id="luckYj"></div><button id="luckClose">再抽一签 / 关闭</button></div>';
  document.body.appendChild(lm);
  function draw(){var f=FORT[Math.floor(Math.random()*FORT.length)];
    document.getElementById('luckLvl').textContent=f[0];
    document.getElementById('luckMsg').textContent=f[1];
    document.getElementById('luckYj').textContent=f[2];
    lm.classList.add('show');if(f[0]==='大吉')rain(['🀄','🎴','✨','🧧'],14);}
  lm.addEventListener('click',function(e){if(e.target===lm||e.target.id==='luckClose')lm.classList.remove('show');else if(e.target.id!=='luckClose')draw();});
  document.getElementById('luckClose').onclick=function(){lm.classList.remove('show');};
  var bt=document.querySelector('.brand h1');
  if(bt){bt.title='点我抽一支考运签 🀄';bt.addEventListener('click',draw);}

  // ---- Konami code: 学神附体 ----
  var seq=['ArrowUp','ArrowUp','ArrowDown','ArrowDown','ArrowLeft','ArrowRight','ArrowLeft','ArrowRight','b','a'],pos=0;
  document.addEventListener('keydown',function(e){var k=e.key.length===1?e.key.toLowerCase():e.key;
    if(k===seq[pos]){pos++;if(pos===seq.length){pos=0;
      toast('🎓 学神附体!开挂模式启动——本场必过!','ach');rain(['🎓','📚','💯','🧠','⚡','🏆'],60);}}
    else{pos=(k===seq[0])?1:0;}});

  // ---- console egg ----
  try{console.log('%c离散数学刷题站 · 祝你上岸 🏊','color:#b3322c;font-size:16px;font-weight:bold');
  console.log('%c彩蛋提示:点标题抽考运签;试试 ↑↑↓↓←→←→BA','color:#b8862f');}catch(e){}
})();

</script>
